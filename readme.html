<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>ki-oku</title>
</head>

<body>
    <h3 style="margin-bottom: 5px;">【概要】</h3>
    <div style="margin-left: 30px;">
        <div style="margin-bottom: 5px;">横3列のフィールドに30個のブロックを積み上げていく</div>
    </div>
    <h3 style="margin-bottom: 5px;">【操作】</h3>
    <div style="margin-left: 30px;">
        <div style="margin-bottom: 5px;">左タップ（左キー）：ブロックを左に積み上げる</div>
        <div style="margin-bottom: 5px;">右タップ（右キー）：ブロックを右に積み上げる</div>
    </div>
    <h3 style="margin-bottom: 5px;">【禁止】</h3>
    <div style="margin-left: 30px;">
        <div style="margin-bottom: 5px;">・隙間が生じる</div>
        <div style="margin-bottom: 5px;">・隣の列と差が開きすぎる（ブロック2個分の高さまで許容）</div>
    </div>
    
</body>

</html>
